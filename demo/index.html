<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇹🇭 Thai Military Dataset Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div class="max-w-3xl mx-auto px-6 py-12">
        <!-- Header -->
        <header class="flex justify-between items-center mb-16">
            <div class="font-bold text-xl tracking-tight">🇹🇭 Thai Military Data</div>
            <nav class="flex gap-6 text-sm font-medium text-slate-500">
                <a href="https://github.com/Dhanabhon/thai-military-dataset" class="hover:text-slate-900">GitHub</a>
                <a href="../docs/superpowers/specs/2026-05-18-github-pages-demo-design.md" class="hover:text-slate-900">Documentation</a>
            </nav>
        </header>

        <!-- Main -->
        <main class="text-center">
            <h1 class="text-4xl font-extrabold mb-4 tracking-tight text-slate-900">Find Ranks & Corps</h1>
            <p class="text-lg text-slate-500 mb-10">Explore the comprehensive dataset of Thai military personnel structure.</p>
            
            <div id="search-container" class="relative text-left max-w-lg mx-auto">
                <!-- Search UI Shell -->
            </div>
        </main>

        <footer class="mt-24 text-center text-xs text-slate-400">
            Powered by Thai Military Dataset • Built with Gemini AI
        </footer>
    </div>
    
    <script>
        const container = document.getElementById('search-container');
        container.innerHTML = `
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="search-input" disabled placeholder="Loading dataset..." class="block w-full pl-11 pr-4 py-3 border border-slate-200 rounded-xl leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm shadow-sm transition-all disabled:opacity-50">
            </div>
            <div id="results-dropdown" class="hidden absolute z-10 mt-2 w-full bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden max-h-96 overflow-y-auto">
                <!-- Results will be injected here -->
            </div>
        `;

        let ranks = [];
        let corps = [];

        async function init() {
            const input = document.getElementById('search-input');
            try {
                const [ranksRes, corpsRes] = await Promise.all([
                    fetch('../data/json/thai_military_ranks.json'),
                    fetch('../data/json/thai_military_corps.json')
                ]);
                ranks = await ranksRes.json();
                corps = await corpsRes.json();
                
                input.disabled = false;
                input.placeholder = "Search by rank name or abbreviation...";
                console.log('Data loaded:', { ranks: ranks.length, corps: corps.length });
            } catch (err) {
                input.placeholder = "Failed to load dataset.";
                console.error('Failed to load data:', err);
            }
        }
        init();

        const input = document.getElementById('search-input');
        const dropdown = document.getElementById('results-dropdown');

        function renderResults(results) {
            if (results.length === 0) {
                dropdown.innerHTML = '<div class="px-4 py-3 text-sm text-slate-500 text-center">No results found</div>';
            } else {
                dropdown.innerHTML = results.map(item => {
                    const isRank = 'rank_en' in item;
                    const name_en = isRank ? item.rank_en : item.corps_en;
                    const name_th = isRank ? item.rank_th : item.corps_th;
                    const abbr = isRank ? (item.abbr_en || '') : '';
                    const branch = item.branch_en.replace('Royal Thai ', '');
                    
                    return `
                        <div class="px-4 py-3 hover:bg-blue-50/50 cursor-pointer border-b border-slate-50 last:border-0 flex justify-between items-center group/item transition-colors">
                            <div class="min-w-0">
                                <div class="text-sm font-semibold text-slate-900 group-hover/item:text-blue-700 transition-colors truncate">
                                    ${name_en} <span class="text-slate-400 font-normal ml-1">(${name_th})</span>
                                </div>
                                <div class="text-[10px] text-slate-400 uppercase tracking-wider flex items-center gap-1.5 mt-0.5">
                                    <span class="${isRank ? 'text-blue-500' : 'text-emerald-500'} font-bold">${isRank ? 'Rank' : 'Corps'}</span>
                                    ${abbr ? '<span>•</span> ' + abbr : ''}
                                </div>
                            </div>
                            <span class="flex-shrink-0 text-[10px] font-bold px-2 py-0.5 rounded-md bg-slate-100 text-slate-500 uppercase tracking-tight ml-4">${branch}</span>
                        </div>
                    `;
                }).join('');
            }
            dropdown.classList.remove('hidden');
        }

        input.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                dropdown.classList.add('hidden');
                return;
            }

            const filteredRanks = ranks.filter(r => 
                r.rank_en.toLowerCase().includes(query) || 
                r.rank_th.includes(query) || 
                (r.abbr_en && r.abbr_en.toLowerCase().includes(query)) ||
                (r.abbr_th && r.abbr_th.includes(query))
            );

            const filteredCorps = corps.filter(c => 
                c.corps_en.toLowerCase().includes(query) || 
                c.corps_th.includes(query)
            );

            renderResults([...filteredRanks, ...filteredCorps].slice(0, 10));
        });

        // Hide dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
