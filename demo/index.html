<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇹🇭 Thai Military Dataset - Tactical Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes camo-drift {
            from { background-position: 0 0, 15px 15px, 30px 30px, 45px 45px; }
            to { background-position: 1000px 1000px, 1015px 1015px, 1030px 1030px, 1045px 1045px; }
        }
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        @keyframes result-entry {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bg-digital-camo {
            background-color: #3e4422; /* Olive Drab */
            background-image: 
                /* Black pixels */
                linear-gradient(45deg, #1a1d10 25%, transparent 25%, transparent 75%, #1a1d10 75%, #1a1d10),
                /* Dark Green blocks */
                linear-gradient(45deg, #2a2e16 25%, transparent 25%, transparent 75%, #2a2e16 75%, #2a2e16),
                /* Tan/Khaki pixels */
                linear-gradient(45deg, #a39171 25%, transparent 25%, transparent 75%, #a39171 75%, #a39171),
                /* Field Drab */
                linear-gradient(45deg, #5c4d32 25%, transparent 25%, transparent 75%, #5c4d32 75%, #5c4d32);
            background-size: 60px 60px;
            background-position: 0 0, 15px 15px, 30px 30px, 45px 45px;
            animation: camo-drift 120s linear infinite;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100px;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.05), transparent);
            pointer-events: none;
            z-index: 50;
            animation: scanline 8s linear infinite;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .result-item {
            animation: result-entry 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-digital-camo min-h-screen font-sans text-stone-900 overflow-x-hidden">
    <div class="scanline"></div>
    
    <div class="max-w-3xl mx-auto px-6 py-12 relative z-10">
        <!-- Header -->
        <header class="flex justify-between items-center mb-16 px-6 py-4 rounded-2xl glass-panel shadow-2xl border-t-4 border-[#4b5320]">
            <div class="font-bold text-xl tracking-tighter text-[#2d3319] flex items-center gap-2">
                <span class="bg-[#2d3319] text-white p-1 rounded">TH</span> 
                <span>TACTICAL DATASET</span>
            </div>
            <nav class="flex gap-6 text-xs font-bold text-stone-500 uppercase tracking-widest">
                <a href="https://github.com/Dhanabhon/thai-military-dataset" class="hover:text-[#4b5320] transition-colors">GitHub</a>
                <a href="../docs/superpowers/specs/2026-05-18-github-pages-demo-design.md" class="hover:text-[#4b5320] transition-colors">Docs</a>
            </nav>
        </header>

        <!-- Main -->
        <main class="text-center">
            <div class="inline-block px-3 py-1 bg-[#4b5320] text-white text-[10px] font-black tracking-[0.2em] rounded mb-6 uppercase shadow-lg">
                Verified Personnel Database
            </div>
            <h1 class="text-5xl font-black mb-4 tracking-tighter text-white drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)]">
                ค้นหายศ และเหล่าทหาร
            </h1>
            <p class="text-lg text-stone-200 mb-10 font-medium drop-shadow-md">
                ระบบสืบค้นโครงสร้างบุคลากร 3 เหล่าทัพ (บก, เรือ, อากาศ)
            </p>
            
            <div id="search-container" class="relative text-left max-w-lg mx-auto">
                <!-- Search UI Shell -->
            </div>
        </main>

        <footer class="mt-24 text-center text-[10px] text-stone-300 font-bold uppercase tracking-[0.3em] drop-shadow-sm">
            Supported by Thai Military Dataset • Tactical System v1.1
        </footer>
    </div>
    
    <script>
        const container = document.getElementById('search-container');
        container.innerHTML = `
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-[#4b5320]">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="search-input" disabled placeholder="INITIALIZING SYSTEM..." class="block w-full pl-14 pr-6 py-4 border-2 border-transparent rounded-2xl leading-5 bg-white text-[#2d3319] placeholder-stone-400 focus:outline-none focus:ring-4 focus:ring-[#4b5320]/30 focus:border-[#4b5320] sm:text-sm shadow-2xl transition-all disabled:opacity-50 font-bold tracking-tight">
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
                    <div class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div>
                </div>
            </div>
            <div id="results-dropdown" class="hidden absolute z-10 mt-3 w-full glass-panel border border-stone-200 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] overflow-hidden max-h-96 overflow-y-auto">
                <!-- Results will be injected here -->
            </div>
        `;

        let ranks = [];
        let corps = [];

        const branchMap = {
            'Royal Thai Army': 'ทบ.',
            'Royal Thai Navy': 'ทร.',
            'Royal Thai Air Force': 'ทอ.'
        };

        async function init() {
            const input = document.getElementById('search-input');
            try {
                const [ranksRes, corpsRes] = await Promise.all([
                    fetch('../data/json/thai_military_ranks.json'),
                    fetch('../data/json/thai_military_corps.json')
                ]);
                ranks = await ranksRes.json();
                corps = await corpsRes.json();
                
                input.disabled = false;
                input.placeholder = "ค้นหาชื่อยศ, เหล่า หรือตัวย่อ...";
            } catch (err) {
                input.placeholder = "SYSTEM ERROR: FAILED TO LOAD";
                console.error('Failed to load data:', err);
            }
        }
        init();

        const input = document.getElementById('search-input');
        const dropdown = document.getElementById('results-dropdown');

        function renderResults(results) {
            if (results.length === 0) {
                dropdown.innerHTML = '<div class="px-6 py-8 text-sm text-stone-500 text-center font-bold italic tracking-wide">NO MATCHING DATA FOUND</div>';
            } else {
                dropdown.innerHTML = results.map((item, index) => {
                    const isRank = 'rank_en' in item;
                    const name_en = isRank ? item.rank_en : item.corps_en;
                    const name_th = isRank ? item.rank_th : item.corps_th;
                    const abbr = isRank ? (item.abbr_en || '') : '';
                    const branch = branchMap[item.branch_en] || item.branch_en;
                    
                    return `
                        <div class="result-item px-6 py-4 hover:bg-[#4b5320]/10 cursor-pointer border-b border-stone-100 last:border-0 flex justify-between items-center group/item transition-all" style="animation-delay: ${index * 0.05}s">
                            <div class="min-w-0">
                                <div class="text-sm font-black text-[#2d3319] group-hover/item:text-[#4b5320] transition-colors truncate">
                                    ${name_th} <span class="text-stone-400 font-bold ml-1 text-xs uppercase tracking-tight">${name_en}</span>
                                </div>
                                <div class="text-[9px] text-stone-500 uppercase tracking-[0.15em] flex items-center gap-2 mt-1 font-black">
                                    <span class="px-1.5 py-0.5 rounded ${isRank ? 'bg-[#626d39] text-white' : 'bg-[#8b7355] text-white'}">${isRank ? 'RANK' : 'CORPS'}</span>
                                    ${abbr ? '<span>•</span> <span class="text-[#4b5320]">' + abbr + '</span>' : ''}
                                </div>
                            </div>
                            <span class="flex-shrink-0 text-[10px] font-black px-3 py-1 rounded-lg bg-stone-100 text-[#2d3319] border border-stone-200 uppercase tracking-tighter ml-4">${branch}</span>
                        </div>
                    `;
                }).join('');
            }
            dropdown.classList.remove('hidden');
        }

        input.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                dropdown.classList.add('hidden');
                return;
            }

            const filteredRanks = ranks.filter(r => 
                r.rank_en.toLowerCase().includes(query) || 
                r.rank_th.includes(query) || 
                (r.abbr_en && r.abbr_en.toLowerCase().includes(query)) ||
                (r.abbr_th && r.abbr_th.includes(query))
            );

            const filteredCorps = corps.filter(c => 
                c.corps_en.toLowerCase().includes(query) || 
                c.corps_th.includes(query)
            );

            renderResults([...filteredRanks, ...filteredCorps].slice(0, 10));
        });

        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
