<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇹🇭 Thai Military Dataset - Tactical Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        @keyframes result-entry {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Thai Digital Camouflage Pattern */
        .bg-thai-digital {
            background-color: #3b4632; /* Mid Green */
            background-image: 
                /* Layer 1: Darkest Brown/Black blocks */
                conic-gradient(from 0deg at 25% 25%, #1a1d10 25%, transparent 0) 0 0 / 60px 60px,
                conic-gradient(from 0deg at 50% 50%, #1a1d10 25%, transparent 0) 30px 30px / 120px 120px,
                /* Layer 2: Brownish blocks */
                conic-gradient(from 0deg at 75% 75%, #463a2a 25%, transparent 0) 15px 15px / 80px 80px,
                /* Layer 3: Light Green blocks */
                conic-gradient(from 0deg at 10% 10%, #7b8e5c 25%, transparent 0) 45px 45px / 100px 100px,
                /* Layer 4: Dark Green blocks */
                conic-gradient(from 0deg at 40% 40%, #2a2e16 25%, transparent 0) 10px 10px / 50px 50px;
            background-blend-mode: normal;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100px;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.05), transparent);
            pointer-events: none;
            z-index: 50;
            animation: scanline 8s linear infinite;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .result-item {
            animation: result-entry 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-thai-digital min-h-screen font-sans text-stone-900 overflow-x-hidden">
    <div class="scanline"></div>
    
    <div class="max-w-3xl mx-auto px-6 py-12 relative z-10">
        <!-- Header -->
        <header class="flex justify-between items-center mb-16 px-6 py-5 rounded-2xl glass-panel border-t-4 border-[#1a1d10]">
            <div class="font-bold text-xl tracking-tight text-[#1a1d10] flex items-center gap-2">
                <span class="bg-[#1a1d10] text-white px-2 py-0.5 rounded text-sm font-black">THAI</span> 
                <span class="tracking-widest font-black uppercase">Military Dataset</span>
            </div>
            <nav class="flex gap-6 text-[10px] font-black text-stone-500 uppercase tracking-[0.2em]">
                <a href="https://github.com/Dhanabhon/thai-military-dataset" class="hover:text-[#2a2e16]">GitHub</a>
                <a href="../docs/superpowers/specs/2026-05-18-github-pages-demo-design.md" class="hover:text-[#2a2e16]">Docs</a>
            </nav>
        </header>

        <!-- Main -->
        <main class="text-center">
            <h1 class="text-5xl font-black mb-4 tracking-tighter text-white drop-shadow-[0_4px_8px_rgba(0,0,0,0.6)]">
                ค้นหายศ และเหล่าทหาร
            </h1>
            <p class="text-lg text-stone-100 mb-10 font-bold drop-shadow-[0_2px_4px_rgba(0,0,0,0.4)]">
                ระบบสืบค้นโครงสร้างบุคลากร 3 เหล่าทัพ
            </p>
            
            <div id="search-container" class="relative text-left max-w-lg mx-auto">
                <!-- Search UI Shell -->
            </div>
        </main>

        <footer class="mt-24 text-center text-[10px] text-stone-200 font-bold uppercase tracking-[0.3em] drop-shadow-md">
            Thai Military Dataset • Tactical UI v1.2
        </footer>
    </div>
    
    <script>
        const container = document.getElementById('search-container');
        container.innerHTML = `
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-[#1a1d10]">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="search-input" disabled placeholder="กำลังเชื่อมต่อฐานข้อมูล..." class="block w-full pl-14 pr-6 py-5 border-2 border-transparent rounded-2xl bg-white text-[#1a1d10] placeholder-stone-400 focus:outline-none focus:ring-8 focus:ring-[#1a1d10]/10 focus:border-[#1a1d10] shadow-2xl transition-all disabled:opacity-50 font-black">
                <div class="absolute inset-y-0 right-0 pr-5 flex items-center">
                    <div class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div>
                </div>
            </div>
            <div id="results-dropdown" class="hidden absolute z-10 mt-4 w-full glass-panel border border-stone-200 rounded-3xl overflow-hidden max-h-96 overflow-y-auto">
                <!-- Results will be injected here -->
            </div>
        `;

        let ranks = [];
        let corps = [];

        const branchMap = {
            'Royal Thai Army': 'ทบ.',
            'Royal Thai Navy': 'ทร.',
            'Royal Thai Air Force': 'ทอ.'
        };

        async function init() {
            const input = document.getElementById('search-input');
            try {
                const [ranksRes, corpsRes] = await Promise.all([
                    fetch('../data/json/thai_military_ranks.json'),
                    fetch('../data/json/thai_military_corps.json')
                ]);
                ranks = await ranksRes.json();
                corps = await corpsRes.json();
                
                input.disabled = false;
                input.placeholder = "ค้นหาชื่อยศ, เหล่า หรือตัวย่อ...";
            } catch (err) {
                input.placeholder = "ERROR: SYSTEM OFFLINE";
            }
        }
        init();

        const input = document.getElementById('search-input');
        const dropdown = document.getElementById('results-dropdown');

        function renderResults(results) {
            if (results.length === 0) {
                dropdown.innerHTML = '<div class="px-6 py-10 text-sm text-stone-500 text-center font-black uppercase tracking-widest">No matching personnel found</div>';
            } else {
                dropdown.innerHTML = results.map((item, index) => {
                    const isRank = 'rank_en' in item;
                    const name_en = isRank ? item.rank_en : item.corps_en;
                    const name_th = isRank ? item.rank_th : item.corps_th;
                    const abbr = isRank ? (item.abbr_en || '') : '';
                    const branch = branchMap[item.branch_en] || item.branch_en;
                    
                    return `
                        <div class="result-item px-8 py-5 hover:bg-[#1a1d10]/5 cursor-pointer border-b border-stone-100 last:border-0 flex justify-between items-center group/item transition-all" style="animation-delay: ${index * 0.05}s">
                            <div class="min-w-0">
                                <div class="text-sm font-black text-[#1a1d10] group-hover/item:text-[#2a2e16] truncate">
                                    ${name_th} <span class="text-stone-400 font-bold ml-1 text-[10px] uppercase tracking-tighter">${name_en}</span>
                                </div>
                                <div class="text-[9px] text-stone-500 uppercase tracking-[0.2em] flex items-center gap-2 mt-1.5 font-black">
                                    <span class="px-2 py-0.5 rounded ${isRank ? 'bg-[#2a2e16] text-white' : 'bg-[#463a2a] text-white'}">${isRank ? 'RANK' : 'CORPS'}</span>
                                    ${abbr ? '<span>•</span> <span class="text-[#1a1d10]">' + abbr + '</span>' : ''}
                                </div>
                            </div>
                            <span class="flex-shrink-0 text-[10px] font-black px-4 py-1.5 rounded-xl bg-stone-50 text-[#1a1d10] border border-stone-200 uppercase tracking-tighter ml-4">${branch}</span>
                        </div>
                    `;
                }).join('');
            }
            dropdown.classList.remove('hidden');
        }

        input.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                dropdown.classList.add('hidden');
                return;
            }

            const filteredRanks = ranks.filter(r => 
                r.rank_en.toLowerCase().includes(query) || 
                r.rank_th.includes(query) || 
                (r.abbr_en && r.abbr_en.toLowerCase().includes(query)) ||
                (r.abbr_th && r.abbr_th.includes(query))
            );

            const filteredCorps = corps.filter(c => 
                c.corps_en.toLowerCase().includes(query) || 
                c.corps_th.includes(query)
            );

            renderResults([...filteredRanks, ...filteredCorps].slice(0, 10));
        });

        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
